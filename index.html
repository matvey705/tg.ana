<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта, мама ❤️</title>

<style>

body{
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
font-family:system-ui;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
overflow:hidden;
padding:20px;
}

.container{
max-width:600px;
width:100%;
animation:fade 2s ease;
}

h1{
font-size:clamp(32px,7vw,60px);
margin-bottom:20px;
text-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#text{
font-size:clamp(18px,4.5vw,26px);
line-height:1.6;
min-height:120px;
}

button{
margin-top:35px;
padding:15px 30px;
font-size:clamp(16px,4vw,20px);
border:none;
border-radius:40px;
background:white;
color:#ff4d6d;
cursor:pointer;
box-shadow:0 6px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

button:active{
transform:scale(0.95);
}

@keyframes fade{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

/* падающие сердца */

.heart{
position:absolute;
font-size:22px;
animation:fall linear;
pointer-events:none;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* салют */

.spark{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:white;
animation:boom 1s linear forwards;
}

@keyframes boom{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>🌷 С 8 Марта, мама! 🌷</h1>

<div id="text"></div>

<button onclick="surprise()">Нажми на сюрприз ✨</button>

</div>

<script>

/* печатающийся текст */

const message = `
Спасибо тебе за всю любовь и заботу,
которую ты даришь каждый день.

Ты поддерживаешь меня,
вдохновляешь
и делаешь мою жизнь лучше.

Я очень благодарен,
что у меня есть такая мама.

Пусть каждый день приносит тебе
радость, тепло и улыбки.

С праздником тебя ❤️
`;

let i=0;

function type(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(type,30);
}
}

type();


/* падающие сердца */

function heart(){

const el=document.createElement("div");
el.className="heart";
el.innerHTML="❤️";

el.style.left=Math.random()*100+"vw";
el.style.animationDuration=4+Math.random()*4+"s";

document.body.appendChild(el);

setTimeout(()=>el.remove(),8000);
}

setInterval(heart,350);


/* салют */

function fireworks(x,y){

for(let i=0;i<40;i++){

const spark=document.createElement("div");
spark.className="spark";

const angle=Math.random()*Math.PI*2;
const dist=80+Math.random()*80;

spark.style.left=x+"px";
spark.style.top=y+"px";

spark.style.setProperty("--x",Math.cos(angle)*dist+"px");
spark.style.setProperty("--y",Math.sin(angle)*dist+"px");

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),1000);

}

}

function surprise(){

for(let i=0;i<6;i++){

setTimeout(()=>{
fireworks(
Math.random()*window.innerWidth,
Math.random()*window.innerHeight
);
},i*400)

}

}

</script>

</body>
</html>
