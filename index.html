<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта, мама!</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:appear 2s ease;
}

h1{
    color:#ff4d6d;
    font-size:40px;
}

p{
    font-size:20px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
}

@keyframes appear{
    from{transform:scale(0);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation:fall 5s linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-10vh);}
    100%{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="card">
    <h1>🌷 С 8 Марта, мама! 🌷</h1>
    <p>
    Спасибо тебе за заботу, любовь и поддержку.  
    Ты самый важный человек в моей жизни ❤️
    </p>

    <button onclick="showMessage()">Нажми сюда</button>
    <p id="msg"></p>
</div>

<script>
function showMessage(){
    document.getElementById("msg").innerText =
    "Я тебя очень люблю! Пусть каждый день приносит тебе радость 🌸";
}

function createHeart(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "❤";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = 3 + Math.random()*5 + "s";

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),7000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
